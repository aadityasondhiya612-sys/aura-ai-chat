<!DOCTYPE html>
<html>
<head>
<title>AURA AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #000);
    color: white;
}

/* Container */
.container {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* Header */
.header {
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    border-bottom: 1px solid #222;
}

/* Chat area */
.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

/* Messages */
.message {
    padding: 12px 15px;
    margin: 8px 0;
    border-radius: 12px;
    max-width: 75%;
    line-height: 1.4;
}

.user {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    align-self: flex-end;
}

.bot {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    align-self: flex-start;
}

/* Input */
.input-box {
    display: flex;
    padding: 10px;
    border-top: 1px solid #222;
    background: #000;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #111;
    color: white;
}

button {
    margin-left: 10px;
    padding: 12px 18px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #00ff99, #00cc66);
    color: black;
    font-weight: bold;
}

/* Scroll smooth */
.chat-box::-webkit-scrollbar {
    width: 5px;
}
.chat-box::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="container">

    <div class="header">🚀 AURA - Advanced AI</div>

    <div id="chat" class="chat-box"></div>

    <div class="input-box">
        <input id="msg" placeholder="Ask anything...">
        <button onclick="sendMsg()">Send</button>
    </div>

</div>

<script>
function sendMsg() {
    let input = document.getElementById("msg");
    let chat = document.getElementById("chat");

    let userMsg = input.value;
    if(userMsg === "") return;

    // user msg
    let userDiv = document.createElement("div");
    userDiv.className = "message user";
    userDiv.innerText = userMsg;
    chat.appendChild(userDiv);

    chat.scrollTop = chat.scrollHeight;

    // bot loading
    let botDiv = document.createElement("div");
    botDiv.className = "message bot";
    botDiv.innerText = "Typing...";
    chat.appendChild(botDiv);

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: userMsg})
    })
    .then(res => res.json())
    .then(data => {
        botDiv.innerText = data.reply;
        chat.scrollTop = chat.scrollHeight;
    });

    input.value = "";
}
</script>

</body>
</html>
