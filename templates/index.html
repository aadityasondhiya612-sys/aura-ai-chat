    <!DOCTYPE html>
<html>
<head>
  <title>AURA AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 15px;
      font-size: 20px;
      background: rgba(0,0,0,0.3);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 10px;
      padding: 12px;
      border-radius: 15px;
      max-width: 75%;
      animation: fadeIn 0.3s ease;
    }

    .user {
      background: #00c6ff;
      align-self: flex-end;
    }

    .bot {
      background: #333;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #00ff88;
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

<header>🚀 AURA AI - Smart Chat</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Ask anything...">
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  let input = document.getElementById("msg");
  let text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  addMessage("Typing...", "bot");

  let res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: text})
  });

  let data = await res.json();

  document.querySelector("#chat").lastChild.remove();
  addMessage(data.reply, "bot");
}

function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
