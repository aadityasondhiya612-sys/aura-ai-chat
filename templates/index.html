<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f2027;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  background: #111;
  display: flex;
  justify-content: space-between;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 10px;
  border-radius: 12px;
  max-width: 70%;
  animation: fade 0.3s ease;
}

.user {
  background: #00c6ff;
  align-self: flex-end;
}

.bot {
  background: #333;
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #111;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 5px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.send { background: #00ff88; }
.mic { background: orange; }

@keyframes fade {
  from {opacity:0;}
  to {opacity:1;}
}

/* Light mode */
.light {
  background: #f1f1f1;
  color: black;
}
.light header { background: #ddd; }
.light .bot { background: #ccc; }
.light #inputBox { background: #ddd; }
</style>
</head>

<body>

<header>
  <span>🤖 AURA AI</span>
  <button onclick="toggleTheme()">🌙</button>
</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Ask anything...">
  <button class="mic" onclick="startVoice()">🎤</button>
  <button class="send" onclick="send()">Send</button>
</div>

<script>
// Load saved chat
window.onload = () => {
  let saved = localStorage.getItem("chat");
  if (saved) document.getElementById("chat").innerHTML = saved;
};

// Save chat
function saveChat() {
  localStorage.setItem("chat", document.getElementById("chat").innerHTML);
}

// Add message
function addMessage(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = (type === "bot" ? "🤖 " : "👤 ") + text;
  document.getElementById("chat").appendChild(div);
  saveChat();
}

// Typing effect
function typeEffect(text) {
  let div = document.createElement("div");
  div.className = "msg bot";
  document.getElementById("chat").appendChild(div);

  let i = 0;
  let speed = 20;

  function typing() {
    if (i < text.length) {
      div.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
    saveChat();
  }
  typing();
}

// Send message
async function send() {
  let input = document.getElementById("msg");
  let text = input.value;
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  let res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: text})
  });

  let data = await res.json();
  typeEffect(data.reply);
}

// Voice input
function startVoice() {
  let recognition = new webkitSpeechRecognition();
  recognition.lang = "en-IN";
  recognition.start();

  recognition.onresult = function(event) {
    document.getElementById("msg").value = event.results[0][0].transcript;
  };
}

// Theme toggle
function toggleTheme() {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
