<!DOCTYPE html>
<html>
<head>
<title>AURA AI</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0a0f2c, #050814);
    color: white;
}

.container {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.message {
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    max-width: 80%;
}

.user {
    background: #1e90ff;
    align-self: flex-end;
}

.bot {
    background: #333;
    align-self: flex-start;
}

.input-box {
    display: flex;
    padding: 10px;
    background: #111;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

button {
    margin-left: 10px;
    padding: 10px;
    background: #00ff99;
    border: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
    <div class="header">AURA - Advanced AI Chat</div>

    <div id="chat" class="chat-box"></div>

    <div class="input-box">
        <input id="msg" placeholder="Ask anything...">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
function sendMsg() {
    let input = document.getElementById("msg");
    let chat = document.getElementById("chat");

    let userMsg = input.value;

    if(userMsg === "") return;

    // user message
    let userDiv = document.createElement("div");
    userDiv.className = "message user";
    userDiv.innerText = userMsg;
    chat.appendChild(userDiv);

    // API call
    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({message: userMsg})
    })
    .then(res => res.json())
    .then(data => {
        let botDiv = document.createElement("div");
        botDiv.className = "message bot";
        botDiv.innerText = data.reply;
        chat.appendChild(botDiv);
        chat.scrollTop = chat.scrollHeight;
    });

    input.value = "";
}
</script>

</body>
</html>
